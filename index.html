<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" data-mode="work">
      <main class="timer-container">
        <div id="mode-indicator" class="mode-indicator">Work</div>
        <div id="time-display" class="time-display">25:00</div>
        <div class="controls">
          <button id="start-pause-btn" class="btn btn-primary">Start</button>
          <button id="reset-btn" class="btn btn-secondary">Reset</button>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
