<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <button id="open-settings-btn" class="settings-trigger" aria-label="Open settings">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <div id="app" data-mode="work">
      <main class="timer-container">
        <div id="mode-indicator" class="mode-indicator">Work</div>
        <div id="time-display" class="time-display">25:00</div>
        <div id="session-counter" class="session-counter">0 of 4 sessions</div>
      </main>
      <div class="controls">
        <button id="restart-btn" class="btn-icon btn-icon-secondary" aria-label="Restart">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"/>
            <path d="M3 4v5h5"/>
          </svg>
        </button>
        <button id="play-pause-btn" class="btn-icon btn-icon-primary" aria-label="Start">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor" aria-hidden="true">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <button id="reset-btn" class="btn-icon btn-icon-secondary" aria-label="Reset session">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
      </div>
    </div>

    <dialog id="settings-modal" class="settings-modal" aria-labelledby="settings-title">
      <div class="modal-content">
        <header class="modal-header">
          <h2 id="settings-title">Settings</h2>
          <button id="close-settings-btn" class="modal-close" aria-label="Close settings">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </header>
        <div class="modal-body">
          <div class="settings-field">
            <label for="sessions-input">Sessions</label>
            <div class="input-with-suffix">
              <input id="sessions-input" type="number" min="1" value="4">
              <span class="input-suffix">total</span>
            </div>
          </div>
          <div class="settings-field">
            <label for="work-duration-input">Work</label>
            <div class="input-with-suffix">
              <input id="work-duration-input" type="number" min="1" value="25">
              <span class="input-suffix">minutes</span>
            </div>
          </div>
          <div class="settings-field">
            <label for="break-duration-input">Break</label>
            <div class="input-with-suffix">
              <input id="break-duration-input" type="number" min="1" value="5">
              <span class="input-suffix">minutes</span>
            </div>
          </div>
        </div>
        <footer class="modal-footer">
          <button id="apply-settings-btn" class="btn btn-primary">Apply</button>
        </footer>
      </div>
    </dialog>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
